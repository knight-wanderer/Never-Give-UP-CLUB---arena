<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Đấu trường NC</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f1117;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        color:white;
    }

    .arena{
        width:700px;
        background:#161b22;
        border-radius:25px;
        padding:25px;
        position:relative;
        overflow:hidden;
        border:4px solid transparent;

        background-image:
        linear-gradient(#161b22,#161b22),
        linear-gradient(135deg,
        #ff0080,
        #00ffee,
        #ffe600,
        #ff0080);

        background-origin:border-box;
        background-clip:padding-box,border-box;

        box-shadow:
        0 0 20px rgba(0,255,255,0.3),
        0 0 40px rgba(255,0,128,0.2);
    }

    .title{
        text-align:center;
        font-size:40px;
        font-weight:bold;
        margin-bottom:25px;

        background:linear-gradient(90deg,#ff0080,#00ffee,#ffe600);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .players-box{
        background:#0d1117;
        border-radius:18px;
        padding:15px;
        height:420px;
        overflow-y:auto;
        border:2px solid #30363d;
    }

    .player{
        display:flex;
        align-items:center;
        gap:15px;
        padding:12px;
        margin-bottom:12px;
        border-radius:15px;
        background:#1f2937;
        transition:0.25s;
        cursor:pointer;
        text-decoration:none;
        color:white;
    }

    .player:hover{
        transform:scale(1.02);
        background:#2d3748;
    }

    .offline{
        opacity:0.4;
        pointer-events:none;
        filter:grayscale(100%);
    }

    .avatar{
        width:55px;
        height:55px;
        border-radius:50%;
        object-fit:cover;
        border:2px solid #00ffee;
    }

    .info{
        flex:1;
    }

    .username{
        font-size:20px;
        font-weight:bold;
    }

    .elo{
        color:#cbd5e1;
        margin-top:3px;
    }

    .status{
        padding:8px 14px;
        border-radius:999px;
        font-weight:bold;
        min-width:80px;
        text-align:center;
    }

    .online{
        background:#16a34a;
    }

    .off{
        background:#dc2626;
    }

    .register-box{
        margin-top:20px;
        display:flex;
        gap:10px;
    }

    input{
        flex:1;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#1e293b;
        color:white;
        font-size:16px;
        outline:none;
    }

    button{
        padding:14px 22px;
        border:none;
        border-radius:12px;
        background:linear-gradient(90deg,#ff0080,#00ffee);
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .message{
        margin-top:12px;
        text-align:center;
        font-weight:bold;
    }

    ::-webkit-scrollbar{
        width:8px;
    }

    ::-webkit-scrollbar-thumb{
        background:#555;
        border-radius:999px;
    }
</style>
</head>

<body>

<div class="arena">

    <div class="title">
        Đấu trường NC
    </div>

    <div class="players-box" id="playersBox">
    </div>

    <div class="register-box">
        <input
            type="text"
            id="usernameInput"
            placeholder="Nhập username Chess.com..."
        />

        <button onclick="registerPlayer()">
            Đăng ký
        </button>
    </div>

    <div class="message" id="message"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "nc-arena.firebaseapp.com",
  projectId: "nc-arena",
  storageBucket: "nc-arena.firebasestorage.app",
  messagingSenderId: "372698332125",
  appId: "1:372698332125:web:9210ead9703430cb81d434"
};

   const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("Firebase OK");
   
let players = [];

async function fetchPlayer(username){

    try{

        const response = await fetch(
            `https://api.chess.com/pub/player/${username}`
        );

        if(!response.ok){
            return null;
        }

        const data = await response.json();

        const statsResponse = await fetch(
            `https://api.chess.com/pub/player/${username}/stats`
        );

        const stats = await statsResponse.json();

        let rapidElo = 0;

        if(stats.chess_rapid){
            rapidElo = stats.chess_rapid.last.rating;
        }

        const lastOnline = data.last_online * 1000;
        const now = Date.now();

        const diffMinutes =
            (now - lastOnline) / 1000 / 60;

        const isOnline = diffMinutes <= 10;

        return {
            username:data.username,
            avatar:
            data.avatar ||
            "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif",

            elo:rapidElo,

            online:isOnline,

            profile:
            `https://www.chess.com/member/${data.username}`
        };

    }catch(err){
        return null;
    }
}

function renderPlayers(){

    players.sort((a,b)=>b.elo-a.elo);

    const box =
    document.getElementById("playersBox");

    box.innerHTML = "";

    players.forEach(player=>{

        const card =
        document.createElement("a");

        card.className =
        "player " +
        (player.online ? "" : "offline");

        card.href = player.profile;
        card.target = "_blank";

        card.innerHTML = `
            <img
                class="avatar"
                src="${player.avatar}"
            >

            <div class="info">

                <div class="username">
                    ${player.username}
                </div>

                <div class="elo">
                    Rapid Elo: ${player.elo}
                </div>

            </div>

            <div class="status ${
                player.online
                ? "online"
                : "off"
            }">

                ${
                    player.online
                    ? "ON"
                    : "OFF"
                }

            </div>
        `;

        box.appendChild(card);
    });
}

async function registerPlayer(){

    const input =
    document.getElementById("usernameInput");

    const message =
    document.getElementById("message");

    const username =
    input.value.trim();

    if(username === ""){
        message.style.color = "#ff4d4d";
        message.innerText =
        "Vui lòng nhập username!";
        return;
    }

    const existed =
    players.find(
        p=>
        p.username.toLowerCase()
        ===
        username.toLowerCase()
    );

    if(existed){

        message.style.color = "#ffcc00";
        message.innerText =
        "Người chơi đã đăng ký!";
        return;
    }

    message.style.color = "white";
    message.innerText =
    "Đang kiểm tra...";

    const player =
    await fetchPlayer(username);

    if(!player){

        message.style.color = "#ff4d4d";

        message.innerText =
        "Người dùng không tồn tại!";
        return;
    }

    players.push(player);

    renderPlayers();

    message.style.color = "#00ff99";

    message.innerText =
    "Đăng ký thành công!";

    input.value = "";
}

</script>

</body>
</html>
